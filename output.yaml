apiVersion: v1
kind: Pod
metadata:
  name: schema-registry-test-internal-externals-cert-secrets
  namespace: "messaging"
  labels:
    app.kubernetes.io/component: redpanda
    app.kubernetes.io/instance: schema-registry
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: redpanda
    helm.sh/chart: redpanda-5.10.4
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  securityContext: 
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch
  containers:
    - name: redpanda
      image: docker.redpanda.com/redpandadata/redpanda:v25.1.7
      command:
        - bash
        - -c
        - |
          set -x

          retry() {
            local retries="$1"
            local command="$2"

            # Run the command, and save the exit code
            bash -c $command
            local exit_code=$?

            # If the exit code is non-zero (i.e. command failed), and we have not
            # reached the maximum number of retries, run the command again
            if [[ $exit_code -ne 0 && $retries -gt 0 ]]; then
              retry $(($retries - 1)) "$command"
              else
              # Return the exit code from the command
              return $exit_code
            fi
          }
      volumeMounts: 
        - mountPath: /etc/redpanda
          name: base-config
        - mountPath: /etc/tls/certs/default
          name: redpanda-default-cert
        - mountPath: /etc/tls/certs/external
          name: redpanda-external-cert
      securityContext: 
        allowPrivilegeEscalation: null
        runAsGroup: 101
        runAsNonRoot: null
        runAsUser: 101
  volumes: 
    - configMap:
        name: schema-registry
      name: base-config
    - name: redpanda-default-cert
      secret:
        defaultMode: 288
        secretName: schema-registry-default-cert
    - name: redpanda-external-cert
