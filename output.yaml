apiVersion: v1
kind: Pod
metadata:
  name: "schema-registry-test-lifecycle"
  namespace: "messaging"
  labels:
    app.kubernetes.io/component: redpanda
    app.kubernetes.io/instance: schema-registry
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: redpanda
    helm.sh/chart: redpanda-5.10.4
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  securityContext: 
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch
  containers:
    - name: redpanda
      image: docker.redpanda.com/redpandadata/redpanda:v25.1.7
      env:
        - name: SERVICE_NAME
          value: schema-registry-0
      command:
        - /bin/timeout
        - "180"
        - bash
        - -xec
        - |
          /bin/timeout -v 45 bash -x /var/lifecycle/preStop.sh
          ls -l /tmp/preStop*
          test -f /tmp/preStopHookStarted
          test -f /tmp/preStopHookFinished

          /bin/timeout -v 45 bash -x /var/lifecycle/postStart.sh
          ls -l /tmp/postStart*
          test -f /tmp/postStartHookStarted
          test -f /tmp/postStartHookFinished
      volumeMounts: 
        - mountPath: /etc/redpanda
          name: base-config
        - mountPath: /etc/tls/certs/default
          name: redpanda-default-cert
        - mountPath: /etc/tls/certs/external
          name: redpanda-external-cert
        - name: lifecycle-scripts
          mountPath: /var/lifecycle
      securityContext: 
        allowPrivilegeEscalation: null
        runAsGroup: 101
        runAsNonRoot: null
        runAsUser: 101
  volumes: 
    - configMap:
        name: schema-registry
      name: base-config
    - name: redpanda-default-cert
      secret:
        defaultMode: 288
        secretName: schema-registry-default-cert
    - name: redpanda-external-cert
      secret:
        defaultMode: 288
        secretName: schema-registry-external-cert
    - name: lifecycle-scripts
      secret:
        secretName: schema-registry-sts-lifecycle
        defaultMode: 0o775
