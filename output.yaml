# Source: schema-registry/charts/redpanda/templates/tests/test-nodeport-tls.yaml
apiVersion: v1
kind: Pod
metadata:
  name: schema-registry-test-nodeport-tls
  namespace: "messaging"
  labels:
    app.kubernetes.io/component: redpanda
    app.kubernetes.io/instance: schema-registry
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: redpanda
    helm.sh/chart: redpanda-5.10.4
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  serviceAccountName: test-nodeport-tls-redpanda-no-a-test
  restartPolicy: Never
  securityContext: 
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch
  containers:
    - name: redpanda
      image: mintel/docker-alpine-bash-curl-jq:latest
      command:
        - bash
        - -c
        - |
          set -x
          export APISERVER=https://kubernetes.default.svc
          export SERVICEACCOUNT=/var/run/secrets/kubernetes.io/serviceaccount
          export NAMESPACE=$(cat ${SERVICEACCOUNT}/namespace)
          export TOKEN=$(cat ${SERVICEACCOUNT}/token)
          export CACERT=${SERVICEACCOUNT}/ca.crt
          
          ip_list=""
          
          replicas=3
          if [ "${replicas}" -lt "1" ]; then
            echo "replicas cannot be less than 1"
            exit 1
          fi
          
          range=$(expr $replicas - 1)          
          ordinal_list=$(seq 0 $range)

          set -e 
          
          for i in $ordinal_list
          do
            POD_DESC=$(curl --cacert ${CACERT} --header "Authorization: Bearer ${TOKEN}" \
            -X GET ${APISERVER}/api/v1/namespaces/messaging/pods/schema-registry-$i)
            ip=$(echo $POD_DESC | jq -r .status.hostIP )
            ip_list="$ip $ip_list"
          done
          
          echo test will be run against $ip_list
          echo testing NodePort connectivity
      volumeMounts: 
        - mountPath: /etc/redpanda
          name: base-config
        - mountPath: /etc/tls/certs/default
          name: redpanda-default-cert
        - mountPath: /etc/tls/certs/external
          name: redpanda-external-cert
      securityContext: 
        allowPrivilegeEscalation: null
        runAsGroup: 101
        runAsNonRoot: null
        runAsUser: 101
  volumes: 
    - configMap:
        name: schema-registry
      name: base-config
    - name: redpanda-default-cert
      secret:
        defaultMode: 288
        secretName: schema-registry-default-cert
    - name: redpanda-external-cert
      secret:
        defaultMode: 288
        secretName: schema-registry-external-cert
