server:
  port: 8080

spring:
  application:
    name: api-gateway

  jwt:
    secret: 8h10tHJZHISS8mFvpnqSUZe/QRD6ICFHMdVnPD2d4FA=

  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://localhost:8083
            predicates:
              - Path=/auth/**
          - id: user-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/users/**
          - id: product-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/v1/products/**
          - id: inventory-service
            uri: http://localhost:8089
            predicates:
              - Path=/api/v1/inventory/**
          - id: order-service
            uri: http://localhost:8087
            predicates:
              - Path=/api/v1/orders/**
          - id: notification-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/v1/notifications/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: TRACE
    org.springdoc: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui.html