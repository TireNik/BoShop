name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checkstyle-and-tests:
    name: Checkstyle + Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Checkstyle
        run: mvn checkstyle:check --batch-mode --fail-never

      - name: Run unit tests and generate coverage
        run: mvn clean verify -Pcoverage --batch-mode

      - name: Check coverage threshold (≥ 10%)
        run: |
          COVERAGE=$(jq -r '.totals.line.pct' target/site/jacoco/jacoco.xml)
          COVERAGE_INT=${COVERAGE%.*}
          echo "Line coverage: $COVERAGE_INT%"
          if [ "$COVERAGE_INT" -lt 10 ]; then
            echo "Coverage is below 10% ($COVERAGE_INT%)", exit 1
          fi
          echo "Coverage is OK: $COVERAGE_INT% ≥ 10%"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

  build-docker-images:
    name: Build Docker Images
    needs: checkstyle-and-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yaml build

  test-deployment:
    name: Test Deployment
    needs: build-docker-images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Start services
        run: |
          docker-compose -f docker-compose.yaml up -d

      - name: Wait for services to be healthy
        run: |
          sleep 60
          # Check if critical services are running
          docker-compose -f docker-compose.yaml ps

      - name: Test API Gateway
        run: |
          # Wait for API Gateway to start
          sleep 30
          # Try to access health endpoint
          if ! curl -f http://localhost:8088/actuator/health; then
            echo "API Gateway is not healthy"
            docker-compose -f docker-compose.yaml logs api-gateway
            exit 1
          fi

      - name: Stop services
        if: always()
        run: |
          docker-compose -f docker-compose.yaml down

  deploy-dev:
    name: Deploy to Dev
    needs: test-deployment
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Deploy to dev environment
        run: |
          docker-compose -f docker-compose.yaml up -d

  deploy-prod:
    name: Deploy to Prod (manual approval)
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Deploy to prod environment
        run: |
          docker-compose -f docker-compose.yaml up -d