replicaCount: 1

image:
  repository: api-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8080

jwt:
  secret: "8h10tHJZHISS8mFvpnqSUZe/QRD6ICFHMdVnPD2d4FA="

services:
  auth: "http://auth-service:8080"
  user: "http://user-service:8080"
  product: "http://product-service:8080"
  inventory: "http://inventory-service:8080"
  order: "http://order-service:8080"
  notification: "http://notification-service:8080"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

healthcheck:
  enabled: true
  path: "/actuator/health"
  initialDelaySeconds: 30
  periodSeconds: 10