spring:
  server:
    forward-headers-strategy: framework
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:postgresql://auth-postgres.dev.svc.cluster.local:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: redpanda.dev.svc.cluster.local:9092
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        enable.idempotence: false
    properties:
      allow.auto.create.topics: true
      schema.registry.url: http://redpanda.dev.svc.cluster.local:8081
      auto.register.schemas: true
      use.latest.version: true
      check.compatibility: false
  redis:
    host: redis.dev.svc.cluster.local
    port: 6379
    timeout: 2000ms

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 172857963583-o8643qod894lu5sh22dqig1ojk1htaep.apps.googleusercontent.com
            client-secret: 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
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: email, profile
    jwt:
      secret: 8h10tHJZHISS8mFvpnqSUZe/QRD6ICFHMdVnPD2d4FA=
      access-token-validity: 3600
      refresh-token-validity: 86400

  logging:
    level:
      org.springframework.cloud.gateway: DEBUG
      org.springframework.security: DEBUG
      org.springframework.security.web.FilterChainProxy: TRACE
      org.apache.kafka: DEBUG
      org.springframework.kafka: DEBUG